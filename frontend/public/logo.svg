<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C0C0C0;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#E8E8E8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A0A0A0;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#D8D8D8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B0B0B0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="silverDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#808080;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A0A0A0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#707070;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Crown base -->
  <rect x="45" y="140" width="110" height="8" rx="2" fill="url(#silverDark)"/>
  <rect x="50" y="152" width="100" height="5" rx="2" fill="url(#silverDark)"/>
  <!-- Crown body -->
  <path d="M50 140 L50 90 L75 110 L100 70 L125 110 L150 90 L150 140 Z" fill="none" stroke="url(#silver)" stroke-width="4" stroke-linejoin="round"/>
  <!-- Crown points -->
  <circle cx="50" cy="88" r="6" fill="url(#silver)"/>
  <circle cx="100" cy="66" r="6" fill="url(#silver)"/>
  <circle cx="150" cy="88" r="6" fill="url(#silver)"/>
  <!-- Chart bars -->
  <rect x="68" y="115" width="8" height="20" rx="1" fill="url(#silver)"/>
  <rect x="80" y="105" width="8" height="30" rx="1" fill="url(#silver)"/>
  <rect x="92" y="100" width="8" height="35" rx="1" fill="url(#silver)"/>
  <!-- Dollar sign -->
  <text x="122" y="125" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="url(#silver)" text-anchor="middle">$</text>
</svg>
