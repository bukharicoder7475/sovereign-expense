<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 700" width="512" height="700">
  <!-- Background -->
  <rect width="512" height="700" fill="#000000"/>
  
  <!-- Icon: Dark navy rounded square -->
  <rect x="156" y="0" width="200" height="200" rx="44" ry="44" fill="#1B2559"/>
  
  <!-- Outer L -->
  <path d="M215 42 L215 158 L300 158" 
        fill="none" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Inner L -->
  <path d="M215 42 L215 158 L300 158" 
        fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Ledgerly text -->
  <text x="256" y="290" 
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="64" font-weight="800" 
        fill="#E0E4F0" text-anchor="middle" 
        letter-spacing="4">Ledgerly</text>

  <!-- "A PROJECT OF" text -->
  <text x="180" y="350" 
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="14" font-weight="600" 
        fill="#666666" text-anchor="middle" 
        letter-spacing="6">A PROJECT OF</text>

  <!-- Sovereign S icon -->
  <rect x="200" y="328" width="24" height="24" rx="6" ry="6" fill="none"/>
  <path d="M212 332 C208 332, 205 335, 205 338 C205 341, 208 343, 212 343 C216 343, 219 346, 219 349 C219 352, 216 354, 212 354" 
        fill="none" stroke="#6B5CE7" stroke-width="3" stroke-linecap="round"/>
  <path d="M212 332 L212 336 M208 338 L216 338 M208 344 L216 344 M212 350 L212 354" 
        fill="none" stroke="#6B5CE7" stroke-width="2.5" stroke-linecap="round"/>

  <!-- "SOVEREIGN" text -->
  <text x="320" y="350" 
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="14" font-weight="700" 
        fill="#666666" text-anchor="middle" 
        letter-spacing="6">SOVEREIGN</text>
</svg>
